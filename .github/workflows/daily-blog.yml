name: Daily blog post

on:
  schedule:
    # 03:30 UTC = 09:00 IST every day
    - cron: '30 3 * * *'
  workflow_dispatch: {} # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Commit & push
        run: |
          git config user.name "Standout Labs Bot"
          git config user.email "bot@standoutlabs.in"
          git add src/pages/blog
          if git diff --staged --quiet; then
            echo "No new post to commit."
          else
            git commit -m "content: daily blog post ($(date +%F))"
            git push
          fi
